services:
  postgres:
    image: postgres:16
    container_name: gamingrank_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamingrank
      POSTGRES_PASSWORD: gamingrank123
      POSTGRES_DB: gamingrank
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: