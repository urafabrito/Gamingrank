<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GamingRank - Turma</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>GamingRank</span>
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
      <a class="link-top" href="./professor.html">Voltar</a>
      <button id="btnSair" class="link-top" type="button">Sair</button>
    </div>
  </header>

  <main class="container">
  <section class="result-header">
    <h1 id="tituloTurma">Turma</h1>
  </section>

  <div id="msg" class="subtle" style="margin-top:12px;"></div>

  <section class="turma turma-card-lite" style="margin-top:16px;">
    <div style="display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
      <div>
        <h3 id="nomeTurmaCard" style="margin:0;">PDS</h3>
        <div class="subtle" id="nomeAlunoCard" style="margin-top:4px;"></div>
      </div>

      <select id="selectAluno" style="height:40px; border-radius:10px; border:1px solid var(--line); padding:0 10px; min-width:260px;">
      </select>
    </div>

    <div class="table-wrap" style="margin-top:10px;">
      <table class="sheet-lite">
        <thead>
          <tr>
            <th>Atividade</th>
            <th>Nota</th>
            <th>Máx</th>
          </tr>
        </thead>
        <tbody id="tbodyNotas"></tbody>
      </table>
    </div>

    <div class="admin-actions" style="margin-top:14px;">
      <button id="btnAddAluno" class="btn-small" type="button">Adicionar aluno</button>
      <button id="btnDelAluno" class="btn-small danger" type="button">Excluir aluno</button>
      <button id="btnAddAtv" class="btn-small" type="button">Adicionar atividade</button>
      <button id="btnDelAtv" class="btn-small danger" type="button">Excluir atividade</button>
      <button id="btnRelatorio" class="btn-small" type="button">Gerar relatório</button>
      <button id="btnImportTxt" class="btn-small" type="button">Importar alunos</button>
      <button id="btnUsarPontos" class="btn-small" type="button">Usar pontos</button>
      <input id="fileImport" type="file" accept=".txt" style="display:none" />
    </div>
  </section>
</main>

  <div id="modalAluno" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Adicionar aluno</h3>
      <button id="fecharModalAluno" class="icon-btn" type="button">✖</button>
    </div>

    <form id="formModalAluno" class="modal-form">
      <label for="modalMatricula">Matrícula</label>
      <input id="modalMatricula" type="text" placeholder="Digite a matrícula" />

      <label for="modalNome">Nome</label>
      <input id="modalNome" type="text" placeholder="Digite o nome do aluno" />

      <div class="modal-actions">
        <button id="cancelarModalAluno" class="btn-small danger" type="button">Cancelar</button>
        <button class="btn-small" type="submit">Salvar</button>
      </div>
    </form>
  </div>
  </div>

  <div id="modalAtividade" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Adicionar atividade</h3>
        <button id="fecharModalAtividade" class="icon-btn" type="button">✖</button>
      </div>

      <form id="formModalAtividade" class="modal-form">
        <label for="modalNomeAtividade">Nome da atividade</label>
        <input id="modalNomeAtividade" type="text" placeholder="Ex: Atvd 1" />

        <label for="modalMaxAtividade">Máximo de pontos</label>
        <input id="modalMaxAtividade" type="number" step="0.1" min="0.1" placeholder="Ex: 10" />

        <div class="modal-actions">
          <button id="cancelarModalAtividade" class="btn-small danger" type="button">Cancelar</button>
          <button class="btn-small" type="submit">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalPontos" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Usar pontos</h3>
        <button id="fecharModalPontos" class="icon-btn" type="button">✖</button>
      </div>

      <form id="formModalPontos" class="modal-form">
        <div id="modalPontosAlunoInfo" class="subtle"></div>

        <label for="modalQtdPontos">Quantidade de pontos</label>
        <input id="modalQtdPontos" type="number" step="0.1" min="0.1" placeholder="Ex: 2" />

        <div class="modal-actions">
          <button id="cancelarModalPontos" class="btn-small danger" type="button">Cancelar</button>
          <button class="btn-small" type="submit">Confirmar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalExcluirAluno" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Excluir aluno</h3>
      <button id="fecharModalExcluirAluno" class="icon-btn" type="button">✖</button>
    </div>

    <div class="modal-form">
      <div id="textoExcluirAluno" class="modal-danger-text"></div>

      <div class="modal-actions">
        <button id="cancelarModalExcluirAluno" class="btn-small" type="button">Cancelar</button>
        <button id="confirmarExcluirAluno" class="btn-small danger" type="button">Excluir</button>
      </div>
    </div>
  </div>
  </div>

  <div id="modalExcluirAtividade" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Excluir atividade</h3>
      <button id="fecharModalExcluirAtividade" class="icon-btn" type="button">✖</button>
    </div>

    <form id="formModalExcluirAtividade" class="modal-form">
      <label for="modalSelectAtividadeExcluir">Atividade</label>
      <select id="modalSelectAtividadeExcluir"></select>

      <div id="textoExcluirAtividade" class="modal-danger-text">
        As notas dessa atividade também serão removidas.
      </div>

      <div class="modal-actions">
        <button id="cancelarModalExcluirAtividade" class="btn-small" type="button">Cancelar</button>
        <button class="btn-small danger" type="submit">Excluir</button>
      </div>
    </form>
  </div>
  </div>


  <div class="footerbar"></div>

  <script src="../turma.js"></script>
  <script>
    document.getElementById("btnSair")?.addEventListener("click", () => {
      sessionStorage.removeItem("adminSecret");
      window.location.href = "./professor-login.html";
    });
  </script>
</body>
</html>
